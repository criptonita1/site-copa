name: Sync mata-mata (ESPN)

# Cron de verdade, na nuvem (independe de qualquer app aberto): puxa os
# confrontos/resultados oficiais do mata-mata da ESPN e atualiza o matches.json.
# Roda A CADA 30 MIN — assim que um jogo acaba (ESPN marca como encerrado), o
# bracket atualiza em até ~30 min. Só commita/deploya quando algo muda, então
# rodadas sem novidade são no-op (sem deploy à toa). O placar nos cards já é
# tempo real via /api/scores. Minutos :07/:37 evitam o pico do topo da hora
# (onde o Actions costuma atrasar). Push na main dispara o deploy na Vercel.

on:
  schedule:
    - cron: "7,37 * * * *" # a cada 30 min (:07 e :37)
  workflow_dispatch: {} # permite rodar manualmente pelo botão "Run workflow"

permissions:
  contents: write # necessário pra commitar/pushar o matches.json

concurrency:
  group: sync-knockout
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Sincroniza com a ESPN
        run: npx tsx scripts/sync-knockout.ts --apply

      - name: Valida o matches.json
        run: npm run validate

      - name: Commita e publica se mudou
        run: |
          if [[ -z "$(git status --porcelain src/data/matches.json)" ]]; then
            echo "Nada novo pra sincronizar hoje."
            exit 0
          fi
          git config user.name "ovc-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/data/matches.json
          git commit -m "data: sync mata-mata via ESPN (GitHub Actions)"
          git push
